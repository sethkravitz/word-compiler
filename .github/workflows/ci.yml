name: CI

on:
  push:
    branches: [main, phase-*]
  pull_request:
    branches: [main, phase-*]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Unit + integration tests
        run: pnpm test

      - name: Eval (mock mode)
        run: pnpm eval:mock
